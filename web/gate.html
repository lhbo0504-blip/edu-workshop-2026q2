<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问验证 · 教育行业&企点产品 2026Q2 Workshop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #285EF6 0%, #1A4CD8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.gate-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 48px 44px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
}
.gate-icon {
  font-size: 36px;
  margin-bottom: 14px;
}
.gate-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
}
.gate-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 28px;
}
.gate-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.12);
  color: #fff;
  font-size: 15px;
  outline: none;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.gate-input::placeholder { color: rgba(255,255,255,0.5); }
.gate-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.18); }
.gate-btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #fff;
  color: #285EF6;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.gate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
.gate-err {
  margin-top: 10px;
  font-size: 12px;
  color: #FFB4B4;
  min-height: 16px;
}
.gate-foot {
  margin-top: 22px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body>
  <div class="gate-card">
    <div class="gate-icon">🔒</div>
    <div class="gate-title">教育行业&企点产品 2026Q2 Workshop</div>
    <div class="gate-sub">请输入访问密码</div>
    <input id="pw" class="gate-input" type="password" placeholder="访问密码" autofocus>
    <button class="gate-btn" onclick="verify()">进入</button>
    <div id="err" class="gate-err"></div>
    <div class="gate-foot">仅限授权人员访问</div>
  </div>

<script>
const PASS = "0515";
function verify() {
  const v = document.getElementById('pw').value;
  if (v === PASS) {
    sessionStorage.setItem('ws_auth', '1');
    const next = new URLSearchParams(location.search).get('next') || './index.html';
    location.href = next;
  } else {
    document.getElementById('err').textContent = '密码不正确，请重试';
    document.getElementById('pw').value = '';
  }
}
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') verify();
});
// 已认证则直接跳主页
if (sessionStorage.getItem('ws_auth') === '1') {
  const next = new URLSearchParams(location.search).get('next') || './index.html';
  location.href = next;
}
</script>
</body>
</html>
